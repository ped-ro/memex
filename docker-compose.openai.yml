# docker-compose.openai.yml — OpenAI embeddings override
#
# Use instead of the default local embedding model:
#   docker compose -f docker-compose.yml -f docker-compose.openai.yml up -d
#
# Requires OPENAI_API_KEY in .env
# Produces 1536-dim vectors (text-embedding-3-small) instead of 1024-dim (mxbai)
# If switching from local embeddings, you must re-index (drop chunks, run full import)

services:
  embeddings:
    build:
      context: ./embeddings-service
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      EMBED_MODEL: text-embedding-3-small
      PORT: 8765
    volumes: []  # no local model cache needed
    healthcheck:
      start_period: 30s  # faster — no model download

  mcp:
    environment:
      EMBED_DIM: 1536
